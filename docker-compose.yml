services:
  phos:
    build: .
    ports:
      - "33000:33000"
    volumes:
      - ./data/models:/app/models
      - ./data/library:/app/library
    environment:
      - RUST_LOG=info
      #- PHOS_DUMMY_AI=1  # Uncomment to skip AI model loading
      - PHOS_LIBRARY_PATH=/app/library
    restart: unless-stopped
