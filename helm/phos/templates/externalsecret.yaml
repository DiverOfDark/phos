{{- if and .Values.oidc.externalSecret.enabled (not .Values.oidc.existingSecret) -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "phos.oidcSecretName" . }}
  labels:
    {{- include "phos.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    name: {{ .Values.oidc.externalSecret.store }}
    kind: {{ .Values.oidc.externalSecret.storeKind }}
  refreshInterval: {{ .Values.oidc.externalSecret.refreshInterval | quote }}
  target:
    name: {{ include "phos.oidcSecretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client_id
      remoteRef:
        key: {{ .Values.oidc.externalSecret.webCredentialsKey }}
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: {{ .Values.oidc.externalSecret.webCredentialsKey }}
        property: client_secret
    # The mobile app is a public (native) client — only its client_id exists.
    - secretKey: mobile_client_id
      remoteRef:
        key: {{ .Values.oidc.externalSecret.mobileCredentialsKey }}
        property: client_id
  {{- end }}
